<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LeThe Dashboard - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
    <style>
        /* --- GIAO DIỆN PREMIUM (LETHE THEME) --- */
        :root {
            --bg-color: #0d1117; 
            --card-bg: #161b22;   
            --text-primary: #c9d1d9; 
            --text-secondary: #8b949e;
            --accent-color: #2dd4bf; /* Teal */
            --border-color: #30363d; 
            --glow-color: rgba(45, 212, 191, 0.4);
            --font-stack: 'Fira Code', monospace;
            --transition-smooth: all 0.5s cubic-bezier(0.23, 1, 0.32, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-stack);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 0;
            overflow-x: hidden;
        }

        /* Lưới nền công nghệ */
        .background-grid {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 50px 50px;
            opacity: 0.1;
            z-index: -1;
        }

        .main-container { width: 100%; max-width: 480px; padding: 20px; text-align: center; }

        /* --- ANIMATION TIÊU ĐỀ "LETHE" --- */
        header { margin-bottom: 60px; position: relative; }

        .brand-title {
            font-size: 4.5rem;
            color: var(--accent-color);
            font-weight: 500;
            letter-spacing: 5px;
            text-transform: uppercase;
            position: relative;
            display: inline-block;
            margin-bottom: 20px;
        }

        .brand-title::after {
            content: 'LETHE';
            position: absolute;
            left: 0; top: 0;
            width: 100%; height: 100%;
            color: var(--accent-color);
            filter: blur(15px);
            opacity: 0.5;
            z-index: -1;
            animation: titleGlow 4s infinite alternate;
        }

        .brand-title span {
            display: inline-block;
            opacity: 0;
            transform: translateY(30px) scale(0.8) blur(10px);
            animation: fadeUpIn 0.8s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }

        .brand-title span:nth-child(1) { animation-delay: 0.2s; }
        .brand-title span:nth-child(2) { animation-delay: 0.4s; }
        .brand-title span:nth-child(3) { animation-delay: 0.6s; }
        .brand-title span:nth-child(4) { animation-delay: 0.8s; }
        .brand-title span:nth-child(5) { animation-delay: 1.0s; }

        @keyframes fadeUpIn {
            to {
                opacity: 1;
                transform: translateY(0) scale(1) blur(0);
            }
        }

        @keyframes titleGlow {
            0% { filter: blur(15px); opacity: 0.5; }
            100% { filter: blur(25px); opacity: 0.8; }
        }

        /* --- Card System --- */
        .cards-wrapper {
            display: flex;
            flex-direction: column;
            gap: 30px;
            opacity: 0;
            transform: translateY(40px);
            animation: cardsAppear 1s cubic-bezier(0.23, 1, 0.32, 1) forwards;
            animation-delay: 1.5s;
        }

        @keyframes cardsAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 35px;
            transition: var(--transition-smooth);
            text-align: left;
            position: relative;
            overflow: hidden;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: 
                linear-gradient(var(--border-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--border-color) 1px, transparent 1px);
            background-size: 20px 20px;
            opacity: 0;
            transition: 0.5s;
            z-index: 0;
        }

        .card:hover::before { opacity: 0.05; }

        .card:hover {
            transform: translateY(-12px) scale(1.02);
            border-color: var(--accent-color);
            box-shadow: 0 20px 50px var(--glow-color);
        }

        .card-header {
            display: flex;
            align-items: center;
            margin-bottom: 20px;
            position: relative; z-index: 1;
        }

        .status-dot {
            width: 12px; height: 12px;
            background-color: var(--accent-color);
            border-radius: 50%;
            margin-right: 18px;
            box-shadow: 0 0 10px var(--accent-color);
            position: relative;
        }
        
        .status-dot::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            background-color: var(--accent-color);
            animation: pulse 2s infinite;
            opacity: 0.5;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.5; }
            100% { transform: scale(2.5); opacity: 0; }
        }

        .card-body { position: relative; z-index: 1; }

        .card-body p { 
            color: var(--text-secondary); 
            font-size: 1rem;
            line-height: 1.7; 
            margin-bottom: 30px;
        }

        .warning-text {
            color: #fca5a5;
            font-weight: 500;
            background: rgba(239, 68, 68, 0.1);
            border-left: 3px solid #ef4444;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 0.9rem;
            line-height: 1.5;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            background: transparent;
            color: var(--accent-color);
            border: 1px solid var(--accent-color);
            transition: 0.3s ease;
            font-size: 0.95rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            position: relative; overflow: hidden;
        }

        .btn::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(45, 212, 191, 0.2), transparent);
            transition: 0.5s;
        }

        .btn:hover::after { left: 100%; }

        .btn:hover {
            background-color: var(--accent-color);
            color: var(--bg-color);
            box-shadow: 0 5px 15px var(--glow-color);
        }

        .icon { margin-left: 12px; transition: 0.3s; font-size: 1.1rem; }
        .btn:hover .icon { transform: translate(3px, -3px) scale(1.1); }

    </style>
</head>
<body>

    <div class="background-grid"></div>

    <div class="main-container">
        <header>
            <div class="brand-title">
                <span>L</span><span>E</span><span>T</span><span>H</span><span>E</span>
            </div>
        </header>

        <div class="cards-wrapper">
            
            <div class="card">
                <div class="card-header">
                    <div class="status-dot"></div>
                    <h2>RustDesk Remote</h2>
                </div>
                <div class="card-body">
                    <p>Tải xuống file APK để bắt đầu kết nối với thiết bị của bạn.</p>
                    <a href="RustDesk.apk" download class="btn">
                        DOWNLOAD APK <span class="icon">↓</span>
                    </a>
                </div>
            </div>

            <div class="card">
                <div class="card-header">
                    <div class="status-dot"></div>
                    <h2>JJSploit Android</h2>
                </div>
                <div class="card-body">
                    <div class="warning-text">
                        [LƯU Ý CẢNH BÁO] Khuyên ae chỉ nên sử dụng JJSploit trên Cloud Phone để đảm bảo an toàn.
                    </div>
                    <a href="https://wearedevs.net/d/JJSploit-Android#google_vignette" target="_blank" rel="noopener noreferrer" class="btn">
                        OPEN DOWNLOAD LINK <span class="icon">↗</span>
                    </a>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
